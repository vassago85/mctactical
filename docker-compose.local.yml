services:
  api:
    build:
      context: ./src/HuntexPos.Api
      dockerfile: Dockerfile
    container_name: mctactical-local-api
    volumes:
      - ./data:/app/data
    ports:
      - "5288:8080"
    environment:
      TZ: Africa/Johannesburg
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Data Source=/app/data/huntex.db
      App__PdfStoragePath: /app/data/pdfs
      App__BrandingStoragePath: /app/data/branding
      App__PublicBaseUrl: http://localhost:5173
      # All secrets must come from a local .env file (gitignored). This compose
      # file no longer ships defaults — `cp .env.local.example .env` and fill it
      # in before running. Keeps secrets out of version control.
      Jwt__Key: ${JWT_KEY:?set JWT_KEY in .env (>=32 random chars)}
      Jwt__Issuer: ${JWT_ISSUER:-LocalPosDev}
      Jwt__Audience: ${JWT_AUDIENCE:-LocalPosDev}
      Seed__OwnerEmail: ${OWNER_EMAIL:?set OWNER_EMAIL in .env}
      Seed__OwnerPassword: ${OWNER_PASSWORD:?set OWNER_PASSWORD in .env}
