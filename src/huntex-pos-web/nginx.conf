server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    # When TLS is terminated at Nginx Proxy Manager / another proxy, plain-HTTP clients send
    # X-Forwarded-Proto: http. Send them to HTTPS (skip if header absent — e.g. local docker).
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Preserve HTTPS when an outer proxy (e.g. Nginx Proxy Manager) terminates TLS
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Authorization $http_authorization;
        # Large imports / PDF generation can run a few minutes; raise from the default.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Hashed assets from Vite — cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker and index must never be stale
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
